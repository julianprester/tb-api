services:
  thunderbird:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: thunderbird
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Australia/Sydney
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - TB_API_TOKEN=${TB_API_TOKEN:-}
      - TB_API_HOST=0.0.0.0
      - TB_API_HOSTS=thunderbird
      - KEEP_APP_RUNNING=1
    ports:
      - "5800:5800"
      - "5900:5900"
      - "9595:9595"
    volumes:
      - thunderbird_config:/config
    networks:
      - ocpa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9595/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  thunderbird_config:

networks:
  ocpa-network:
    external: true
